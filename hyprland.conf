#

#Core System & Audio
#swayosd-git (The visual bar for volume/brightness)

#brightnessctl (Controls screen brightness)

#pamixer (Controls audio levels)

#pipewire-pulse (Audio server)

#wireplumber (Audio session manager)

#Desktop Environment Tools
#waybar (Status bar)

#swaybg (Wallpaper handling)

#wofi (App menu)

#foot (Terminal)

#nm-applet (Network icon)

#blueman (Bluetooth icon)

#hyprpolkitagent (Password popups)

#Applications
#flatpak (Required for Sober/Roblox)

#google-chrome (Your browser)

#----------------------------------------
#        Script
#________________________________________


# --- Monitors ---
# If it's still too big, change the 1 to 0.8
monitor=,preferred,auto,1

# --- Programs ---
$terminal = foot
$menu = wofi --show drun
$browser = google-chrome-stable

# --- Startup ---
exec-once = waybar
exec-once = swaybg -i ~/Pictures/wallpaper.jpg -m fill
exec-once = avizo-service
exec-once = nm-applet --indicator
exec-once = blueman-applet

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# --- Appearance ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# --- Animations ---
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = workspaces, 1, 6, default
}

# --- Keybindings ---
$mainMod = SUPER

# Sound & Light (SwayOSD)
# binde lets you hold the key to repeat the action
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind  = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
binde = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
binde = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Menu Toggle (Press Super to open/close)
bindr = $mainMod, Super_L, exec, pkill wofi || $menu

# Waybar Toggle (Hide/Show)
bind = $mainMod, Y, exec, pkill -USR1 waybar

# Core Bindings-Aplications
bind = $mainMod, S, exec, flatpak run org.vinegarhq.Sober
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, killactive
bind = $mainMod, M, exit
bind = $mainMod, V, togglefloating

#Extra Bindings

#bind = $mainMod, (key to execute cmd), exec,(cmd)
#bind = $mainMod, (key to execute cmd), exec,(cmd)
#bind = $mainMod, (key to execute cmd), exec,(cmd)
#bind = $mainMod, (key to execute cmd), exec,(cmd)
#bind = $mainMod, (key to execute cmd), exec,(cmd)

#Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3

# Move Window
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
